<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A frequency-domain plot from DC to 7 MHz showing the luminance band rolling off from DC to about 4.2 MHz, a chrominance cluster around the 3.58 MHz colour subcarrier, and a narrow audio FM subcarrier near 6.0 to 6.5 MHz.</desc>
