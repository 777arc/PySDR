<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 11 60 53">
  <!-- Wires (rect-shaped, exact dimensions, drawn FIRST so blocks paint
       over their flat ends — no stroke caps to leave knobs or show
       through the cap stack's semi-transparent plates). -->
  <rect x="30" y="19.5" width="6" height="1" fill="#555"/>
  <rect x="50" y="19.5" width="4" height="1" fill="#555"/>
  <rect x="22.5" y="26" width="1" height="4" fill="#555"/>
  <rect x="22.5" y="44.6" width="1" height="5.4" fill="#555"/>
  <rect x="60.5" y="26" width="1" height="4" fill="#555"/>
  <rect x="60.5" y="44" width="1" height="6" fill="#555"/>

  <!-- Top row: three blocks (CW · mixer · BPF) -->
  <rect x="16" y="14" width="14" height="12" rx="2.4" fill="#4dd0e1"/>
  <circle cx="43" cy="20" r="7" fill="#ff9800"/>
  <line x1="38" y1="15" x2="48" y2="25" stroke="#fff" stroke-width="1.8"/>
  <line x1="48" y1="15" x2="38" y2="25" stroke="#fff" stroke-width="1.8"/>
  <rect x="54" y="14" width="14" height="12" rx="2.4" fill="#e040fb"/>

  <!-- "Cap" stack -->
  <rect x="14" y="30" width="18" height="2.6" rx="0.8" fill="#7c4dff"/>
  <rect x="14" y="36" width="18" height="2.6" rx="0.8" fill="#7c4dff" opacity="0.55"/>
  <rect x="14" y="42" width="18" height="2.6" rx="0.8" fill="#7c4dff" opacity="0.25"/>
  <rect x="14" y="50" width="18" height="12" rx="2.4" fill="#4dd0e1"/>

  <!-- "Trap" -->
  <polygon points="52,30 70,30 68,44 54,44" fill="#7c4dff"/>
  <rect x="52" y="50" width="18" height="12" rx="2.4" fill="#4dd0e1"/>
</svg>
